<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KZNGFA â 1.18 Employment Equity</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #f0f2f5;
      --panel: #fff;
      --border: #dde1e7;
      --text: #1a1f2e;
      --muted: #6b7280;
      --accent: #1d4ed8;
      --col-task: #2563eb;
      --col-event: #16a34a;
      --col-gateway: #d97706;
      --col-lane: #7c3aed
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 9px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
      flex-wrap: wrap;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .07)
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      color: var(--accent);
      text-transform: uppercase;
      white-space: nowrap
    }

    .title {
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      white-space: nowrap
    }

    .spacer {
      flex: 1;
      min-width: 8px
    }

    .legend {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0
    }

    .controls {
      display: flex;
      gap: 5px;
      align-items: center
    }

    #zoom-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 38px;
      text-align: center
    }

    button {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      color: #374151;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background .15s
    }

    button:hover {
      background: #e5e7eb
    }

    main {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    #canvas-wrap {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #fff;
      cursor: grab
    }

    #canvas-wrap:active {
      cursor: grabbing
    }

    #map-container {
      position: relative;
      transform-origin: 0 0;
      display: inline-block;
      margin: 16px
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none
    }

    .hit {
      position: absolute;
      cursor: pointer;
      pointer-events: all;
      transition: outline .1s, background .1s
    }

    .hit:hover {
      outline: 2px dashed rgba(0, 0, 0, .25)
    }

    .hit-task {
      border-radius: 14px;
      background: transparent
    }

    .hit-task.selected {
      background: rgba(37, 99, 235, .18);
      outline: 2.5px solid #2563eb !important;
      box-shadow: 0 0 0 5px rgba(37, 99, 235, .08)
    }

    .hit-event {
      border-radius: 50%;
      background: transparent
    }

    .hit-event.selected {
      background: rgba(22, 163, 74, .18);
      outline: 2.5px solid #16a34a !important;
      box-shadow: 0 0 0 5px rgba(22, 163, 74, .08)
    }

    .hit-gateway {
      background: transparent;
      transform: rotate(45deg);
      border-radius: 3px
    }

    .hit-gateway:hover {
      outline: 2px dashed rgba(0, 0, 0, .25) !important
    }

    .hit-gateway.selected {
      background: rgba(217, 119, 6, .18);
      outline: 2.5px solid #d97706 !important;
      box-shadow: 0 0 0 5px rgba(217, 119, 6, .08)
    }

    .hit-lane {
      background: transparent
    }

    .hit-lane:hover {
      background: rgba(124, 58, 237, .05);
      outline: none !important
    }

    .hit-lane.selected {
      background: rgba(124, 58, 237, .10);
      outline: 2px solid #7c3aed !important
    }

    #panel {
      width: 290px;
      flex-shrink: 0;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: -1px 0 4px rgba(0, 0, 0, .05)
    }

    .panel-head {
      padding: 13px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .panel-head h3 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted)
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 10px;
      color: #9ca3af;
      text-align: center;
      font-size: 12px
    }

    .card {
      display: none
    }

    .card.visible {
      display: block
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 3px;
      margin-bottom: 12px
    }

    .badge-task {
      background: rgba(37, 99, 235, .10);
      color: #1d4ed8;
      border: 1px solid rgba(37, 99, 235, .2)
    }

    .badge-event {
      background: rgba(22, 163, 74, .10);
      color: #15803d;
      border: 1px solid rgba(22, 163, 74, .2)
    }

    .badge-gateway {
      background: rgba(217, 119, 6, .10);
      color: #b45309;
      border: 1px solid rgba(217, 119, 6, .2)
    }

    .badge-lane {
      background: rgba(124, 58, 237, .10);
      color: #6d28d9;
      border: 1px solid rgba(124, 58, 237, .2)
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 5px;
      line-height: 1.3
    }

    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.5
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0
    }

    .field {
      margin-bottom: 10px
    }

    .fl {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px
    }

    .fv {
      font-size: 12px;
      color: #374151;
      line-height: 1.4
    }

    .multi-header {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(37, 99, 235, .07);
      border: 1px solid rgba(37, 99, 235, .2);
      color: #1d4ed8;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      margin: 3px 3px 3px 0;
      cursor: pointer;
      transition: background .1s;
      line-height: 1.3
    }

    .chip:hover {
      background: rgba(37, 99, 235, .14)
    }

    .chip-x {
      font-size: 14px;
      line-height: 1;
      opacity: .5;
      margin-left: 1px
    }

    .clear-btn {
      margin-top: 12px;
      width: 100%;
      background: #f9fafb;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 7px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: background .1s
    }

    .clear-btn:hover {
      background: #f3f4f6
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px
    }
  </style>
</head>

    "events": [
      {"id": "event-0", "label": "Employment Equity Cycle Initiated", "type": "Start Event", "x": 289.06, "y": 201.7, "r": 88.53, "lane": "Equity Committee", "description": "Process trigger by Equity Committee. Initiates the Employment Equity cycle."},
      {"id": "event-1", "label": "EE Initiatives Implemented", "type": "End Event", "x": 2330, "y": 507.22, "r": 88.53, "lane": "HR · Workforce Strategy", "description": "Final milestone: Workforce diversity metrics improved and HR policies formally updated."}
    ],
    "gateways": []
  }</script>
  <script>
    (function () {
      var data = JSON.parse(document.getElementById('map-data').textContent || '{}');
      var SVG_W = data.svgW || 1200, SVG_H = data.svgH || 800;
      var LANES = data.lanes || [], TASKS = data.tasks || [], EVENTS = data.events || [], GATEWAYS = data.gateways || [];

      var svgEl = document.querySelector('#svg-wrap svg');
      if (svgEl) {
        svgEl.style.display = 'block';
        svgEl.setAttribute('width', SVG_W);
        svgEl.setAttribute('height', SVG_H);
      }
      var overlay = document.getElementById('overlay');
      overlay.style.cssText = 'position:absolute;top:0;left:0;width:' + SVG_W + 'px;height:' + SVG_H + 'px;pointer-events:auto;z-index:5';

      var scale = 1, selSingle = null, selTasks = [];

      function mkHit(cls, style, clickFn) {
        var d = document.createElement('div');
        d.className = 'hit ' + cls;
        d.style.cssText = style;
        // ensure hits are above the SVG and receive pointer events
        d.style.zIndex = 10;
        d.addEventListener('click', function (e) { e.stopPropagation(); clickFn(d); });
        overlay.appendChild(d);
        return d;
      }

      // Normalizers produce consistent objects for the inspector
      function normalizeLane(l) {
        return {
          id: l.id,
          label: l.label || l.sub || '(no label)',
          role: l.role || l.sub || '',
          x: l.x1,
          y: l.y1,
          y1: l.y1,
          y2: l.y2,
          w: (l.x2 - l.x1),
          h: (l.y2 - l.y1)
        };
      }
      function normalizeTask(t) {
        return {
          id: t.id,
          label: t.label || t.sub || '(no label)',
          description: t.description || t.sub || '',
          x: t.x,
          y: t.y,
          w: t.w,
          h: t.h,
          lane: t.lane || ''
        };
      }
      function normalizeEvent(ev) {
        var diameter = ev.r || 0;
        var radius = diameter / 2;
        return {
          id: ev.id,
          label: ev.label || '(no label)',
          type: ev.type || ev.sub || 'Event',
          description: ev.description || ev.sub || '',
          x: (ev.x || 0) - radius,
          y: (ev.y || 0) - radius,
          w: diameter,
          h: diameter,
          cx: ev.x,
          cy: ev.y,
          r: radius
        };
      }
      function normalizeGateway(gw) {
        return {
          id: gw.id,
          label: gw.label || gw.sub || '(gateway)',
          type: gw.type || 'Gateway',
          cx: gw.cx,
          cy: gw.cy,
          bbox: gw.bbox || null
        };
      }

      // Create hit targets
      LANES.forEach(function (l) {
        var nl = normalizeLane(l);
        var style = 'left:' + l.x1 + 'px;top:' + l.y1 + 'px;width:' + (l.x2 - l.x1) + 'px;height:' + (l.y2 - l.y1) + 'px;';
        var el = mkHit('hit-lane', style, function () { selectSingle(nl, el, 'lane'); });
        el._data = nl;
      });

      TASKS.forEach(function (t) {
        var nt = normalizeTask(t);
        var style = 'left:' + (t.x || nt.x) + 'px;top:' + (t.y || nt.y) + 'px;width:' + (t.w || nt.w) + 'px;height:' + (t.h || nt.h) + 'px;';
        var el = mkHit('hit-task', style, function () { toggleTask(nt, el); });
        el._taskId = t.id;
        el._data = nt;
      });

      EVENTS.forEach(function (ev) {
        var ne = normalizeEvent(ev);
        // ensure a minimum hit size for events to make clicking reliable
        var minSize = 32;
        var w = Math.max(ne.w || 0, minSize), h = Math.max(ne.h || 0, minSize);
        // center the hit around the original center
        var left = (ne.cx || (ne.x + w / 2)) - (w / 2);
        var top = (ne.cy || (ne.y + h / 2)) - (h / 2);
        var style = 'left:' + left + 'px;top:' + top + 'px;width:' + w + 'px;height:' + h + 'px;border-radius:50%;';
        var el = mkHit('hit-event', style, function () { selectSingle(ne, el, 'event'); });
        el._data = ne;
      });

      GATEWAYS.forEach(function (gw) {
        var ng = normalizeGateway(gw);
        var sz = (gw.bbox && gw.bbox.w) ? Math.min(gw.bbox.w, gw.bbox.h) * 0.7 : 66;
        var style = 'left:' + (gw.cx - sz / 2) + 'px;top:' + (gw.cy - sz / 2) + 'px;width:' + sz + 'px;height:' + sz + 'px;';
        var el = mkHit('hit-gateway', style, function () { selectSingle(ng, el, 'gateway'); });
        el._data = ng;
      });

      document.getElementById('canvas-wrap').addEventListener('click', clearAll);

      function clearAll() {
        selSingle = null; selTasks = [];
        document.querySelectorAll('.hit').forEach(function (e) { e.classList.remove('selected'); });
        showEmpty();
      }

      window.clearTasks = function () {
        selTasks = [];
        document.querySelectorAll('.hit-task').forEach(function (e) { e.classList.remove('selected'); });
        if (!selSingle) showEmpty(); else renderSingle(selSingle.data, selSingle.type);
      };

      function clearSingleEl() { if (selSingle && selSingle.el) selSingle.el.classList.remove('selected'); }

      function selectSingle(d, el, type) {
        clearSingleEl();
        selTasks = [];
        document.querySelectorAll('.hit-task').forEach(function (e) { e.classList.remove('selected'); });
        el.classList.add('selected');
        selSingle = { data: d, el: el, type: type };
        renderSingle(d, type);
      }

      function toggleTask(t, el) {
        if (selSingle) { clearSingleEl(); selSingle = null; }
        var i = selTasks.indexOf(t.id);
        if (i === -1) { selTasks.push(t.id); el.classList.add('selected'); }
        else { selTasks.splice(i, 1); el.classList.remove('selected'); }
        if (selTasks.length === 0) { showEmpty(); return; }
        renderMulti();
      }

      function showEmpty() {
        document.getElementById('empty-state').style.display = 'flex';
        document.getElementById('single-card').classList.remove('visible');
        document.getElementById('multi-card').classList.remove('visible');
      }

      function renderSingle(d, type) {
        if (!d) return;
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('multi-card').classList.remove('visible');
        document.getElementById('single-card').classList.add('visible');
        var bMap = { lane: ['badge-lane', 'Swim Lane'], event: ['badge-event', 'BPMN Event'], gateway: ['badge-gateway', 'Gateway'], task: ['badge-task', 'Task'] };
        var b = bMap[type] || bMap.task;
        var badge = document.getElementById('card-badge');
        badge.className = 'card-badge ' + b[0];
        badge.textContent = b[1];

        // Title / subtitle
        if (type === 'lane') {
          document.getElementById('card-title').textContent = d.label || '(no label)';
          document.getElementById('card-sub').textContent = d.role || '';
        } else if (type === 'event') {
          document.getElementById('card-title').textContent = d.label || '(no label)';
          document.getElementById('card-sub').textContent = d.type || d.description || '';
        } else if (type === 'task') {
          document.getElementById('card-title').textContent = d.label || '(no label)';
          document.getElementById('card-sub').textContent = d.description || '';
        } else if (type === 'gateway') {
          document.getElementById('card-title').textContent = d.label || '(gateway)';
          document.getElementById('card-sub').textContent = d.type || '';
        } else {
          document.getElementById('card-title').textContent = d.label || '(no label)';
          document.getElementById('card-sub').textContent = d.sub || '';
        }

        var typeText = type === 'lane' ? 'Swim Lane (Pool Partition)' :
          type === 'event' ? (d.type || 'Event') :
            type === 'gateway' ? (d.type || 'Gateway') : 'Task (Activity)';
        document.getElementById('card-type').textContent = typeText;

        var ll = document.getElementById('card-lane-label'), lv = document.getElementById('card-lane');
        if (type === 'lane') {
          ll.textContent = 'Span';
          lv.textContent = ((d.y2 - d.y1) | 0) + ' px vertical';
        } else {
          ll.textContent = 'Swim Lane';
          var centerY = (typeof d.cy !== 'undefined') ? d.cy : (d.y + ((d.h || 0) / 2));
          lv.textContent = d.lane || getLane(centerY);
        }
      }

      function renderMulti() {
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('single-card').classList.remove('visible');
        document.getElementById('multi-card').classList.add('visible');
        var n = selTasks.length;
        document.getElementById('multi-count').textContent = n + ' task' + (n === 1 ? '' : 's') + ' selected';
        var cc = document.getElementById('chip-container');
        cc.innerHTML = '';
        selTasks.forEach(function (tid) {
          var t = TASKS.find(function (x) { return x.id === tid; }) || {};
          var c = document.createElement('div');
          c.className = 'chip';
          var label = document.createElement('span');
          label.textContent = t.label || '(no label)';
          var x = document.createElement('span');
          x.className = 'chip-x';
          x.textContent = '×';
          x.dataset.id = tid;
          x.addEventListener('click', function (e) {
            e.stopPropagation();
            var id = e.target.dataset.id;
            document.querySelectorAll('.hit-task').forEach(function (el) { if (el._taskId === id) el.classList.remove('selected'); });
            selTasks = selTasks.filter(function (z) { return z !== id; });
            if (selTasks.length === 0) showEmpty(); else renderMulti();
          });
          c.appendChild(label);
          c.appendChild(x);
          cc.appendChild(c);
        });
      }

      function getLane(y) {
        var l = LANES.find(function (x) { return y >= x.y1 && y <= x.y2; });
        return l ? (l.label || l.sub || '(lane)') : '—';
      }

      window.zoom = function (d) { scale = Math.min(3, Math.max(.15, scale + d)); applyScale(); };
      window.fitScreen = function () {
        var w = document.getElementById('canvas-wrap');
        scale = Math.min((w.clientWidth - 48) / SVG_W, (w.clientHeight - 48) / SVG_H);
        applyScale();
      };
      function applyScale() {
        document.getElementById('map-container').style.transform = 'scale(' + scale + ')';
        document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
      }
      setTimeout(window.fitScreen, 80);

      (function () {
        var w = document.getElementById('canvas-wrap');
        var drag = false, sx, sy, sl, st;
        w.addEventListener('mousedown', function (e) {
          if (e.target.classList.contains('hit')) return;
          drag = true; sx = e.clientX; sy = e.clientY; sl = w.scrollLeft; st = w.scrollTop;
        });
        window.addEventListener('mousemove', function (e) {
          if (!drag) return;
          w.scrollLeft = sl - (e.clientX - sx);
          w.scrollTop = st - (e.clientY - sy);
        });
        window.addEventListener('mouseup', function () { drag = false; });
        w.addEventListener('wheel', function (e) { e.preventDefault(); window.zoom(e.deltaY < 0 ? .1 : -.1); }, { passive: false });
      })();
    })();
  </script>
</body>

</html>
